<div class="topbar">
  <a routerLink="/quote" class="back">Back to Home</a>
</div>

<section class="wrap">
  <div class="card">
    <div class="logo">EcoWatt</div>
    <h1>Welcome back</h1>
    <p class="sub">Log in to access your energy dashboard, usage, and billing information.</p>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <label>Email address</label>
    <input type="email" [(ngModel)]="email" placeholder="name@email.com"
      (keydown.enter)="login()" [disabled]="loading" />

    <label>Password</label>
    <input type="password" [(ngModel)]="password" placeholder="Enter your password"
      (keydown.enter)="login()" [disabled]="loading" />

    <button (click)="login()" [disabled]="loading">
      {{ loading ? "Logging in..." : "Log in" }}
    </button>

    <p class="bottom">
      Don't have an account?
      <a routerLink="/register">Create one</a>
    </p>
  </div>
</section>
